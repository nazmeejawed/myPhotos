name: Build installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: MyPhoto-Linux
            binary: dist/MyPhoto
          - os: windows-latest
            artifact: MyPhoto-Windows.exe
            binary: dist/MyPhoto.exe
          - os: macos-latest
            artifact: MyPhoto-macOS
            binary: dist/MyPhoto

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Download models
        run: python scripts/download_models.py

      - name: Build executable
        run: pyinstaller myphoto.spec

      - name: Rename artifact
        shell: bash
        run: mv "${{ matrix.binary }}" "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
